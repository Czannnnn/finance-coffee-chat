<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Coffee Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --espresso: #2C1810;
      --dark-roast: #3D2317;
      --medium-roast: #6B3A2A;
      --caramel: #C4853C;
      --caramel-light: rgba(196,133,60,0.12);
      --cream: #F5EDE0;
      --oat-milk: #FAF6F0;
      --white: #FFFDF9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--oat-milk);
      color: var(--espresso);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    nav { background: var(--espresso); padding: 12px 16px; display: flex; justify-content: center; align-items: center; gap: 0; flex-wrap: wrap; }
    nav a {
      color: var(--cream); padding: 4px 12px; text-decoration: none;
      font-size: 14px; font-weight: 500; letter-spacing: 0.3px;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--caramel); }
    .nav-dropdown { position: relative; }
    .nav-dropdown > span {
      color: var(--cream); padding: 4px 12px; font-size: 14px; font-weight: 500;
      letter-spacing: 0.3px; cursor: pointer; transition: color 0.15s; user-select: none;
    }
    .nav-dropdown > span::after { content: ' ▾'; font-size: 10px; }
    .nav-dropdown:hover > span { color: var(--caramel); }
    .nav-dropdown-menu {
      display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      background: var(--dark-roast); border-radius: 10px; padding: 6px 0;
      min-width: 140px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 100; margin-top: 8px;
    }
    .nav-dropdown:hover .nav-dropdown-menu { display: block; }
    .nav-dropdown-menu a {
      display: block; padding: 8px 20px; margin: 0; font-size: 13px;
      white-space: nowrap; color: var(--cream);
    }
    .nav-dropdown-menu a:hover { background: rgba(196,133,60,0.15); color: var(--caramel); }
    .container {
      max-width: 560px; margin: 0 auto; padding: 80px 28px 64px;
      text-align: center;
    }
    .badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: var(--caramel);
      background: var(--caramel-light); padding: 5px 16px; border-radius: 20px;
      margin-bottom: 16px; border: 1px solid rgba(196,133,60,0.2);
    }
    h1 {
      font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700;
      color: var(--espresso); letter-spacing: -0.5px; margin-bottom: 8px;
    }
    h1 em { font-style: italic; color: var(--medium-roast); }
    .sub {
      font-size: 14px; color: var(--medium-roast); font-weight: 300;
    }
    .divider {
      width: 40px; height: 2px; background: var(--caramel);
      margin: 24px auto 0; border-radius: 1px;
    }
    .btn-group {
      margin-top: 48px; display: flex; flex-direction: column;
      gap: 16px; align-items: center;
    }
    .btn-card {
      display: flex; align-items: center; gap: 16px;
      width: 100%; max-width: 400px; padding: 24px 28px;
      background: var(--white); border: 1px solid rgba(44,24,16,0.05);
      border-radius: 16px; box-shadow: 0 2px 20px rgba(44,24,16,0.04);
      text-decoration: none; color: var(--espresso);
      transition: all 0.2s;
    }
    .btn-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(44,24,16,0.08);
      border-color: var(--caramel);
    }
    .btn-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .btn-icon.portfolio { background: rgba(61,90,128,0.1); }
    .btn-icon.asset { background: rgba(74,124,89,0.1); }
    .btn-icon.ipo { background: rgba(196,133,60,0.1); }
    .btn-text { text-align: left; }
    .btn-title {
      font-size: 15px; font-weight: 600; color: var(--espresso);
      margin-bottom: 2px;
    }
    .btn-desc {
      font-size: 12.5px; font-weight: 300; color: var(--medium-roast);
    }
    .btn-arrow {
      margin-left: auto; font-size: 18px; color: var(--caramel);
      flex-shrink: 0;
    }
    @media (max-width: 480px) {
      .container { padding: 48px 16px 48px; }
      h1 { font-size: 28px; }
      .btn-card { padding: 20px 20px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">홈</a>
    <a href="/portfolio.html">포트폴리오</a>
    <a href="/asset.html">자산관리101</a>
    <div class="nav-dropdown">
      <span>공모주</span>
      <div class="nav-dropdown-menu">
        <a href="/ipo.html">캘린더</a>
        <a href="/ipo-analysis.html">종목 분석</a>
      </div>
    </div>
  </nav>
  <div class="container">
    <div class="badge">Finance Coffee Chat</div>
    <h1>투자 <em>커피챗</em></h1>
    <p class="sub">원하시는 페이지를 선택하세요</p>
    <div class="divider"></div>

    <div class="btn-group">
      <a href="/portfolio.html" class="btn-card">
        <div class="btn-icon portfolio">📊</div>
        <div class="btn-text">
          <div class="btn-title">포트폴리오</div>
          <div class="btn-desc">나만의 자산배분 차트 만들기</div>
        </div>
        <span class="btn-arrow">→</span>
      </a>
      <a href="/asset.html" class="btn-card">
        <div class="btn-icon asset">📂</div>
        <div class="btn-text">
          <div class="btn-title">자산관리101</div>
          <div class="btn-desc">PPT 슬라이드 확인하기</div>
        </div>
        <span class="btn-arrow">→</span>
      </a>
      <a href="/ipo.html" class="btn-card">
        <div class="btn-icon ipo">📅</div>
        <div class="btn-text">
          <div class="btn-title">공모주 캘린더</div>
          <div class="btn-desc">공모주 청약 일정 한눈에 보기</div>
        </div>
        <span class="btn-arrow">→</span>
      </a>
      <a href="/ipo-analysis.html" class="btn-card">
        <div class="btn-icon" style="background:rgba(192,86,75,0.1);">🔍</div>
        <div class="btn-text">
          <div class="btn-title">공모주 분석</div>
          <div class="btn-desc">4대 조건 기반 종목 분석</div>
        </div>
        <span class="btn-arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
