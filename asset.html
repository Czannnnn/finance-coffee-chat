<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리101 - Finance Coffee Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --espresso: #2C1810;
      --dark-roast: #3D2317;
      --medium-roast: #6B3A2A;
      --caramel: #C4853C;
      --caramel-light: rgba(196,133,60,0.12);
      --cream: #F5EDE0;
      --oat-milk: #FAF6F0;
      --white: #FFFDF9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--oat-milk);
      color: var(--espresso);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    nav {
      background: var(--espresso); padding: 16px; text-align: center;
    }
    nav a {
      color: var(--cream); margin: 0 16px; text-decoration: none;
      font-size: 14px; font-weight: 500; letter-spacing: 0.3px;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--caramel); }
    .container {
      max-width: 1000px; margin: 0 auto; padding: 48px 28px 64px;
      text-align: center;
    }
    .header { margin-bottom: 32px; }
    .badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: var(--caramel);
      background: var(--caramel-light); padding: 5px 16px; border-radius: 20px;
      margin-bottom: 16px; border: 1px solid rgba(196,133,60,0.2);
    }
    .header h1 {
      font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700;
      color: var(--espresso); letter-spacing: -0.5px;
    }
    .header h1 em { font-style: italic; color: var(--medium-roast); }
    .divider {
      width: 40px; height: 2px; background: var(--caramel);
      margin: 20px auto 0; border-radius: 1px;
    }
    .slide-card {
      background: var(--white); border-radius: 20px;
      padding: 24px; border: 1px solid rgba(44,24,16,0.05);
      box-shadow: 0 4px 30px rgba(44,24,16,0.06);
      margin-bottom: 24px;
    }
    .iframe-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 12px;
      overflow: hidden;
    }
    .iframe-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .drive-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; background: var(--white);
      border: 1px solid rgba(44,24,16,0.12); border-radius: 12px;
      color: var(--espresso); text-decoration: none;
      font-size: 14px; font-weight: 500;
      transition: all 0.2s;
    }
    .drive-link:hover {
      border-color: var(--caramel); color: var(--caramel);
      transform: translateY(-1px);
      box-shadow: 0 2px 12px rgba(44,24,16,0.06);
    }
    @media (max-width: 480px) {
      .container { padding: 32px 16px 48px; }
      .header h1 { font-size: 24px; }
      .slide-card { padding: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">홈(게이트)</a>
    <a href="/portfolio.html">포트폴리오</a>
    <a href="/asset.html">자산관리101</a>
    <a href="/ipo.html">공모주 캘린더</a>
    <a href="/ipo-analysis.html">공모주 분석</a>
  </nav>
  <div class="container">
    <div class="header">
      <div class="badge">Asset Management</div>
      <h1>자산관리 <em>101</em></h1>
      <div class="divider"></div>
    </div>

    <div class="slide-card">
      <div class="iframe-container">
        <iframe
          src="https://docs.google.com/presentation/d/e/2PACX-1vTXhfFnAD6Lzpwr-PLgcE1wXE-7t41Tu2bDYlwLh1NeyBr8Eb-ZFP98Zbr2afWZrA/pubembed?start=true&loop=false&delayms=3000"
          allowfullscreen="true"
          mozallowfullscreen="true"
          webkitallowfullscreen="true">
        </iframe>
      </div>
    </div>

    <a href="https://docs.google.com/presentation/d/19liYwcM5jOAQY7MutjLK4RQQkGk8o3ok/edit?usp=sharing"
      target="_blank" class="drive-link">
      📂 Google 드라이브에서 크게 보기
    </a>
  </div>
</body>
</html>
