  <style>
    :root {
      --espresso: #2C1810;
      --dark-roast: #3D2317;
      --medium-roast: #6B3A2A;
      --caramel: #C4853C;
      --caramel-light: rgba(196,133,60,0.12);
      --latte: #E8D5B7;
      --cream: #F5EDE0;
      --oat-milk: #FAF6F0;
      --white: #FFFDF9;
      --green: #4A7C59;
      --green-light: rgba(74,124,89,0.12);
      --blue: #3D5A80;
      --blue-light: rgba(61,90,128,0.12);
      --red-soft: #C0564B;
      --red-light: rgba(192,86,75,0.10);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--oat-milk);
      color: var(--espresso);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    nav { background: var(--espresso); padding: 12px 16px; text-align: center; }
    nav a {
      color: var(--cream); margin: 0 12px; text-decoration: none;
      font-size: 14px; font-weight: 500; letter-spacing: 0.3px;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--caramel); }
    .subnav {
      background: var(--dark-roast); padding: 8px 16px; text-align: center;
      border-bottom: 1px solid rgba(196,133,60,0.15);
    }
    .subnav-label {
      font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      color: var(--caramel); margin-right: 12px;
    }
    .subnav a {
      color: var(--latte); margin: 0 8px; text-decoration: none;
      font-size: 13px; font-weight: 400; letter-spacing: 0.3px;
      transition: color 0.15s; padding: 4px 8px; border-radius: 6px;
    }
    .subnav a:hover { color: var(--caramel); }
    .subnav a.active { color: var(--cream); background: rgba(196,133,60,0.2); font-weight: 600; }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 28px 64px; }
    .header { text-align: center; margin-bottom: 32px; }
    .badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: var(--caramel);
      background: var(--caramel-light); padding: 5px 16px; border-radius: 20px;
      margin-bottom: 16px; border: 1px solid rgba(196,133,60,0.2);
    }
    .header h1 {
      font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700;
      color: var(--espresso); letter-spacing: -0.5px;
    }
    .header h1 em { font-style: italic; color: var(--medium-roast); }
    .header .sub { font-size: 14px; color: var(--medium-roast); font-weight: 300; margin-top: 8px; }
    .divider { width: 40px; height: 2px; background: var(--caramel); margin: 20px auto 0; border-radius: 1px; }

    /* Filters */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
      justify-content: center;
    }
    .filter-group { display: flex; gap: 4px; }
    .filter-btn {
      padding: 6px 14px; border: 1px solid rgba(44,24,16,0.12); border-radius: 20px;
      background: var(--white); font-family: 'Noto Sans KR', sans-serif;
      font-size: 12.5px; font-weight: 500; color: var(--medium-roast);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--caramel); color: var(--caramel); }
    .filter-btn.active {
      background: var(--espresso); color: var(--cream); border-color: var(--espresso);
    }
    .filter-sep {
      width: 1px; background: rgba(44,24,16,0.1); margin: 4px 8px; flex-shrink: 0;
    }

    /* Legend */
    .legend {
      display: flex; justify-content: center; gap: 16px; margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--medium-roast); font-weight: 400; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.subscribe { background: var(--caramel); }
    .legend-dot.refund { background: var(--blue); }
    .legend-dot.listing { background: var(--green); }

    /* Calendar */
    .calendar-card {
      background: var(--white); border-radius: 20px; padding: 28px 24px;
      border: 1px solid rgba(44,24,16,0.05); box-shadow: 0 4px 30px rgba(44,24,16,0.06);
      margin-bottom: 24px; overflow: visible; position: relative;
    }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .cal-nav-btn {
      width: 36px; height: 36px; border: 1px solid rgba(44,24,16,0.1); border-radius: 10px;
      background: var(--oat-milk); cursor: pointer; font-size: 16px; color: var(--espresso);
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .cal-nav-btn:hover { border-color: var(--caramel); color: var(--caramel); }
    .cal-month {
      font-size: 17px; font-weight: 600; color: var(--espresso); letter-spacing: -0.3px;
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
      width: 100%; max-width: 100%; overflow: hidden;
    }
    .cal-dow {
      text-align: center; font-size: 11px; font-weight: 600; color: var(--medium-roast);
      padding: 8px 0; letter-spacing: 0.5px;
    }
    .cal-day {
      display: flex; flex-direction: column; align-items: stretch;
      gap: 2px; border-radius: 10px; cursor: pointer;
      transition: all 0.12s; position: relative; min-height: 72px;
      padding: 4px 3px;
    }
    .cal-day:hover { background: var(--caramel-light); }
    .cal-day.today { background: var(--caramel-light); font-weight: 700; }
    .cal-day.selected { background: var(--espresso); }
    .cal-day.selected .day-num { color: var(--cream); }
    .cal-day.selected .evt-bar { opacity: 0.9; }
    .cal-day.selected .evt-more { color: var(--cream); }
    .cal-day.other-month .day-num { color: rgba(107,58,42,0.25); }
    .cal-day.other-month { pointer-events: none; }
    .day-num {
      font-size: 12px; font-weight: 500; color: var(--espresso); line-height: 1;
      text-align: center; margin-bottom: 1px;
    }
    .day-events { display: flex; flex-direction: column; gap: 1px; flex: 1; overflow: hidden; max-width: 100%; }
    .evt-bar {
      font-size: 9px; font-weight: 600; padding: 1px 4px; border-radius: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.4; letter-spacing: -0.2px;
    }
    .evt-bar.subscribe { background: var(--caramel); color: var(--white); }
    .evt-bar.refund { background: var(--blue); color: var(--white); }
    .evt-bar.listing { background: var(--green); color: var(--white); }
    .evt-more {
      font-size: 9px; font-weight: 500; color: var(--medium-roast);
      text-align: center; line-height: 1.3; cursor: pointer;
    }

    /* Tooltip */
    .cal-tooltip {
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%); z-index: 50;
      background: var(--espresso); color: var(--cream); border-radius: 10px;
      padding: 10px 14px; min-width: 160px; max-width: 220px;
      box-shadow: 0 4px 20px rgba(44,24,16,0.2);
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    .cal-day:hover .cal-tooltip { opacity: 1; pointer-events: auto; }
    .cal-tooltip::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 6px solid transparent; border-top-color: var(--espresso);
    }
    .cal-tooltip.no-events { display: none; }
    .tt-date { font-size: 11px; font-weight: 600; margin-bottom: 6px; color: var(--latte); }
    .tt-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .tt-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tt-dot.subscribe { background: var(--caramel); }
    .tt-dot.refund { background: var(--blue-light); }
    .tt-dot.listing { background: var(--green-light); }
    .tt-type { font-size: 10px; font-weight: 400; color: var(--latte); min-width: 24px; }
    .tt-name { font-size: 11px; font-weight: 500; color: var(--cream); }

    /* Mobile: dots instead of bars */
    .day-dots-mobile { display: none; }
    .day-dot-m { width: 5px; height: 5px; border-radius: 50%; }
    .day-dot-m.subscribe { background: var(--caramel); }
    .day-dot-m.refund { background: var(--blue); }
    .day-dot-m.listing { background: var(--green); }

    /* Section title */
    .section-title {
      font-size: 13px; font-weight: 600; color: var(--medium-roast);
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px;
      text-align: center;
    }
    .section-count {
      font-weight: 400; color: rgba(107,58,42,0.5); margin-left: 6px;
    }

    /* IPO Cards */
    .ipo-list { display: flex; flex-direction: column; gap: 16px; }
    .ipo-card {
      background: var(--white); border-radius: 16px; padding: 24px;
      border: 1px solid rgba(44,24,16,0.05); box-shadow: 0 2px 20px rgba(44,24,16,0.04);
      transition: all 0.2s; cursor: default;
    }
    .ipo-card:hover {
      box-shadow: 0 4px 24px rgba(44,24,16,0.08);
      border-color: rgba(196,133,60,0.2);
    }
    .ipo-card.hidden { display: none; }
    .ipo-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .ipo-name-group { flex: 1; min-width: 0; }
    .ipo-name { font-size: 16px; font-weight: 700; color: var(--espresso); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .grade-mini {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px;
      letter-spacing: 0.5px; flex-shrink: 0;
    }
    .grade-mini.none { background: rgba(44,24,16,0.06); color: var(--medium-roast); font-weight: 500; }
    .grade-note {
      font-size: 10px; font-weight: 400; color: var(--medium-roast);
      background: rgba(44,24,16,0.04); padding: 2px 6px; border-radius: 4px;
    }
    .detail-btn {
      display: block; text-align: center; margin-top: 12px; padding: 9px 16px;
      background: var(--oat-milk); border: 1px solid rgba(196,133,60,0.2);
      border-radius: 10px; color: var(--caramel); font-size: 13px; font-weight: 500;
      text-decoration: none; transition: all 0.15s;
    }
    .detail-btn:hover { background: var(--caramel-light); border-color: var(--caramel); }
    .ipo-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .ipo-badge {
      font-size: 10.5px; font-weight: 600; padding: 3px 10px; border-radius: 12px;
      letter-spacing: 0.3px;
    }
    .ipo-badge.kospi { background: var(--blue-light); color: var(--blue); }
    .ipo-badge.kosdaq { background: var(--green-light); color: var(--green); }
    .ipo-badge.upcoming { background: var(--caramel-light); color: var(--caramel); }
    .ipo-badge.active { background: var(--green-light); color: var(--green); }
    .ipo-badge.completed { background: rgba(44,24,16,0.06); color: var(--medium-roast); }
    .dday {
      font-size: 13px; font-weight: 700; color: var(--caramel); flex-shrink: 0;
      background: var(--caramel-light); padding: 4px 12px; border-radius: 10px;
    }
    .dday.imminent { color: var(--red-soft); background: var(--red-light); }
    .dday.done { color: var(--medium-roast); background: rgba(44,24,16,0.06); }

    /* Timeline */
    .ipo-timeline {
      display: flex; align-items: center; gap: 0; margin-bottom: 16px;
      background: var(--oat-milk); border-radius: 10px; padding: 14px 16px;
    }
    .tl-step { flex: 1; text-align: center; position: relative; }
    .tl-step::after {
      content: ''; position: absolute; top: 8px; right: -20%; width: 40%;
      height: 2px; background: rgba(44,24,16,0.08);
    }
    .tl-step:last-child::after { display: none; }
    .tl-label { font-size: 10px; font-weight: 600; color: var(--medium-roast); letter-spacing: 0.5px; margin-bottom: 4px; }
    .tl-date { font-size: 12.5px; font-weight: 500; color: var(--espresso); }
    .tl-step.done .tl-label { color: var(--green); }
    .tl-step.current .tl-label { color: var(--caramel); font-weight: 700; }

    /* Info grid */
    .ipo-info {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px;
    }
    .info-item { display: flex; justify-content: space-between; align-items: center; }
    .info-label { font-size: 12.5px; font-weight: 400; color: var(--medium-roast); }
    .info-value { font-size: 13px; font-weight: 600; color: var(--espresso); }

    /* Empty state */
    /* Google Calendar Button */
    .gcal-btn {
      display: block; text-align: center; margin-top: 14px; padding: 10px 16px;
      background: var(--oat-milk); border: 1px solid rgba(61,90,128,0.2);
      border-radius: 10px; color: var(--blue); font-size: 13px; font-weight: 500;
      text-decoration: none; transition: all 0.15s;
    }
    .gcal-btn:hover {
      background: var(--blue-light); border-color: var(--blue);
    }

    .empty-state {
      text-align: center; padding: 48px 24px;
      background: var(--white); border-radius: 16px;
      border: 1px solid rgba(44,24,16,0.05);
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; color: var(--medium-roast); font-weight: 300; }

    @media (max-width: 600px) {
      .container { padding: 32px 16px 48px; }
      .header h1 { font-size: 26px; }
      nav a { margin: 0 6px; font-size: 12.5px; }
      .subnav a { font-size: 12px; margin: 0 4px; }
      .cal-day { min-height: 44px; padding: 4px 2px; }
      .day-num { font-size: 11px; }
      .day-events { display: none; }
      .day-dots-mobile { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; }
      .cal-tooltip { display: none; }
      .ipo-card { padding: 20px 16px; }
      .ipo-timeline { flex-wrap: wrap; gap: 8px; }
      .tl-step::after { display: none; }
      .tl-step { flex: none; width: 48%; }
      .ipo-info { grid-template-columns: 1fr; }
      .filter-bar { gap: 6px; }
      .legend { gap: 10px; }
    }
  </style>

    <!-- Legend -->
    <div class="legend">
      <span class="legend-item"><span class="legend-dot subscribe"></span>청약일</span>
      <span class="legend-item"><span class="legend-dot refund"></span>환불일</span>
      <span class="legend-item"><span class="legend-dot listing"></span>상장일</span>
    </div>

    <!-- Calendar -->
    <div class="calendar-card">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)" data-ga="click_calendar_nav" data-ga-text="prev_month" data-ga-loc="calendar">&larr;</button>
        <span class="cal-month" id="calMonth"></span>
        <button class="cal-nav-btn" onclick="changeMonth(1)" data-ga="click_calendar_nav" data-ga-text="next_month" data-ga-loc="calendar">&rarr;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- IPO Card List -->
    <div class="section-title">공모주 목록 <span class="section-count" id="listCount"></span></div>
    <div class="ipo-list" id="ipoList"></div>
  </div>

  <script>
    // ── Google Sheets 연동 설정 ──
    // 아래 SHEET_ID를 본인의 Google Sheets ID로 교체하세요
    // 예: https://docs.google.com/spreadsheets/d/여기가_SHEET_ID/edit
    const SHEET_ID = '1_xXYdZ5d8COXBajVZ_tyd2p5JaOhQcQnNPQrS9-e-Jk';
    const SHEET_NAME = 'IPO데이터';

    // ── 데이터 ──
    let IPO_DATA = [];

    // ── 샘플 데이터 (Sheets 연동 전 폴백) ──
    const SAMPLE_DATA = [
      { name: '에이치켐', market: 'kosdaq', status: 'completed', price: '15,000원', priceRange: '12,000~15,000원', shares: '2,500,000주', lead: '한국투자증권', competition: '1,247:1', lockup: '62.3%', subscribe: ['2026-04-01','2026-04-02'], refund: '2026-04-04', listing: '2026-04-10' },
      { name: '퓨처로보틱스', market: 'kosdaq', status: 'completed', price: '32,000원', priceRange: '25,000~32,000원', shares: '1,800,000주', lead: 'NH투자증권', competition: '1,583:1', lockup: '71.5%', subscribe: ['2026-04-02','2026-04-03'], refund: '2026-04-07', listing: '2026-04-14' },
      { name: '그린에너지솔루션', market: 'kospi', status: 'active', price: '48,000원', priceRange: '40,000~48,000원', shares: '5,000,000주', lead: '미래에셋증권', competition: '892:1', lockup: '58.7%', subscribe: ['2026-04-04','2026-04-07'], refund: '2026-04-09', listing: '2026-04-16' },
      { name: '바이오시냅스', market: 'kosdaq', status: 'upcoming', price: '-', priceRange: '20,000~25,000원', shares: '3,200,000주', lead: '삼성증권', competition: '-', lockup: '-', subscribe: ['2026-04-10','2026-04-11'], refund: '2026-04-15', listing: '2026-04-22' },
      { name: '스마트물류', market: 'kosdaq', status: 'upcoming', price: '-', priceRange: '8,000~10,000원', shares: '4,000,000주', lead: 'KB증권', competition: '-', lockup: '-', subscribe: ['2026-04-14','2026-04-15'], refund: '2026-04-17', listing: '2026-04-24' },
      { name: '코리아반도체', market: 'kospi', status: 'upcoming', price: '-', priceRange: '55,000~65,000원', shares: '8,000,000주', lead: '한국투자증권', competition: '-', lockup: '-', subscribe: ['2026-04-21','2026-04-22'], refund: '2026-04-24', listing: '2026-04-30' },
      { name: '메디팜헬스', market: 'kosdaq', status: 'upcoming', price: '-', priceRange: '15,000~18,000원', shares: '2,000,000주', lead: '대신증권', competition: '-', lockup: '-', subscribe: ['2026-04-23','2026-04-24'], refund: '2026-04-28', listing: '2026-05-07' },
    ];

    // ── Google Sheets에서 데이터 로드 ──
    async function loadFromSheets() {
      if (!SHEET_ID) {
        console.log('SHEET_ID 미설정 → 샘플 데이터 사용');
        IPO_DATA = SAMPLE_DATA;
        renderAll();
        return;
      }

      try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
        const res = await fetch(url);
        const text = await res.text();

        // Google Visualization API 응답 파싱 (앞뒤 래핑 제거)
        const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/)[1]);
        const rows = json.table.rows;

        IPO_DATA = rows.map(row => {
          const c = row.c;
          // 일반 값: formatted(f) 우선, 없으면 raw(v)
          const val = (i) => {
            if (!c[i]) return '';
            return c[i].f ? String(c[i].f) : (c[i].v != null ? String(c[i].v) : '');
          };
          // 날짜 값: Date(y,m,d) → YYYY-MM-DD 변환
          const dateVal = (i) => {
            if (!c[i] || c[i].v == null) return '';
            const raw = String(c[i].v);
            // Google gviz Date(year, month, day) 형식 (month는 0-indexed)
            const dm = raw.match(/Date\((\d+),(\d+),(\d+)\)/);
            if (dm) {
              const y = dm[1];
              const m = String(Number(dm[2]) + 1).padStart(2, '0');
              const d = dm[3].padStart(2, '0');
              return `${y}-${m}-${d}`;
            }
            // 이미 YYYY-MM-DD 형식이면 그대로
            if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
            // f(formatted) 값에서 추출 시도
            if (c[i].f) {
              const fm = String(c[i].f).match(/(\d{4})[-.](\d{1,2})[-.](\d{1,2})/);
              if (fm) return `${fm[1]}-${fm[2].padStart(2,'0')}-${fm[3].padStart(2,'0')}`;
            }
            return raw;
          };

          const confirmedPrice = val(3);
          const expectedPrice = val(4);

          // 등급 계산용 숫자 파싱
          const compStr = val(10);
          const compMatch = compStr.match(/([\d,.]+)\s*:/);
          const competitionNum = compMatch ? parseFloat(compMatch[1].replace(/,/g, '')) : 0;

          let lockupNum = parseFloat(val(11).replace(/[^0-9.]/g, '')) || 0;
          if (lockupNum > 0 && lockupNum < 1) lockupNum = Math.round(lockupNum * 10000) / 100;

          let floatNum = parseFloat((val(13) || '').replace(/[^0-9.]/g, '')) || 0;
          if (floatNum > 0 && floatNum < 1) floatNum = Math.round(floatNum * 10000) / 100;

          const priceFixed = confirmedPrice ? parseInt(confirmedPrice.replace(/,/g, '')) || 0 : 0;
          const priceNums = expectedPrice.replace(/[^0-9~,]/g, '').split('~');
          const priceBandTop = priceNums.length >= 2 ? parseInt(priceNums[priceNums.length - 1].replace(/,/g, '')) || 0 : 0;

          return {
            name: val(0),
            market: val(1) || 'kosdaq',
            status: val(2) || 'upcoming',
            price: confirmedPrice ? `${confirmedPrice}원` : '-',
            priceRange: expectedPrice ? `${expectedPrice}원` : '-',
            shares: val(12) || '-',
            lead: val(9),
            competition: compStr || '-',
            lockup: val(11) || '-',
            subscribe: [dateVal(5), dateVal(6)],
            refund: dateVal(7),
            listing: dateVal(8),
            // 등급 계산용
            competitionNum, lockupNum, floatNum, priceFixed, priceBandTop,
          };
        }).filter(ipo => ipo.name && ipo.subscribe[0]);

        // 등급 계산
        IPO_DATA.forEach(ipo => { ipo.grade = calcGrade(ipo); });

        console.log(`Google Sheets에서 ${IPO_DATA.length}건 로드 완료`);
        showDataSource('live');
      } catch (e) {
        console.error('Sheets 로드 실패, 샘플 데이터 사용:', e);
        IPO_DATA = SAMPLE_DATA;
        showDataSource('sample');
      }

      renderAll();
    }

    function showDataSource(type) {
      const badge = document.querySelector('.data-source');
      if (!badge) return;
      if (type === 'live') {
        badge.textContent = 'LIVE DATA';
        badge.style.background = 'var(--green-light)';
        badge.style.color = 'var(--green)';
        badge.style.borderColor = 'rgba(74,124,89,0.2)';
      } else {
        badge.textContent = 'SAMPLE DATA';
      }
    }

    // ── State ──
    const TODAY = new Date();
    let currentYear = TODAY.getFullYear();
    let currentMonth = TODAY.getMonth();
    let selectedDate = null;
    let activeStatus = 'all';
    let activeMarket = 'all';

    // ── Helpers ──
    function parseDate(str) {
      if (!str) return new Date(NaN);
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }
    function isValidDate(str) {
      return str && /^\d{4}-\d{2}-\d{2}$/.test(str);
    }
    function fmtDate(str) {
      if (!isValidDate(str)) return '-';
      const [, m, d] = str.split('-');
      return `${parseInt(m)}/${parseInt(d)}`;
    }
    function fmtDateFull(str) {
      if (!isValidDate(str)) return '-';
      const [y, m, d] = str.split('-');
      return `${y}.${m}.${d}`;
    }
    function isSameDay(d1, d2) {
      return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
    }
    function daysBetween(from, to) {
      return Math.ceil((to - from) / (1000 * 60 * 60 * 24));
    }
    function isDateInRange(dateStr, rangeStart, rangeEnd) {
      if (!isValidDate(dateStr) || !isValidDate(rangeStart) || !isValidDate(rangeEnd)) return false;
      const d = parseDate(dateStr);
      return d >= parseDate(rangeStart) && d <= parseDate(rangeEnd);
    }

    function getGradeBadge(grade, dataCount) {
      if (!grade) return '<span class="grade-mini none">등급 미확정</span>';
      const colors = { S: 'var(--green)', A: 'var(--blue)', B: 'var(--caramel)', C: 'var(--red-soft)', D: 'var(--red-soft)' };
      const bg = { S: 'var(--green-light)', A: 'var(--blue-light)', B: 'var(--caramel-light)', C: 'var(--red-light)', D: 'var(--red-light)' };
      let html = `<span class="grade-mini" style="background:${bg[grade]};color:${colors[grade]}">${grade}</span>`;
      if (dataCount < 3) {
        html += '<span class="grade-note">자료 추가 조사중</span>';
      }
      return html;
    }

    // ── 등급 계산 ──
    function calcGrade(ipo) {
      let pass = 0;
      // 확인된 지표 수 카운트
      let available = 0;
      if (ipo.competitionNum > 0) { available++; if (ipo.competitionNum >= 800) pass++; }
      if (ipo.priceFixed > 0) { available++; if (ipo.priceFixed >= ipo.priceBandTop) pass++; }
      if (ipo.lockupNum > 0) { available++; if (ipo.lockupNum >= 15) pass++; }
      if (ipo.floatNum > 0) { available++; if (ipo.floatNum <= 25) pass++; }
      ipo._dataCount = available;
      if (available === 0) return '';
      if (pass === 4 && ipo.lockupNum >= 50) return 'S';
      if (pass >= 3) return 'A';
      if (pass >= 2) return 'B';
      if (pass >= 1) return 'C';
      return 'D';
    }

    function getCalendarBtn(ipo) {
      if (!isValidDate(ipo.subscribe[0]) || !isValidDate(ipo.subscribe[1])) return '';
      // Google Calendar URL: 청약일 종일 이벤트
      const start = ipo.subscribe[0].replace(/-/g, '');
      // 종료일은 다음날 (Google Calendar 종일 이벤트는 exclusive end)
      const endDate = parseDate(ipo.subscribe[1]);
      endDate.setDate(endDate.getDate() + 1);
      const end = `${endDate.getFullYear()}${String(endDate.getMonth()+1).padStart(2,'0')}${String(endDate.getDate()).padStart(2,'0')}`;
      const title = encodeURIComponent(`[공모주 청약] ${ipo.name}`);
      const details = encodeURIComponent(`종목: ${ipo.name}\n공모가: ${ipo.price !== '-' ? ipo.price : ipo.priceRange}\n주관사: ${ipo.lead}\n\n☕ Finance Coffee Chat`);
      const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}`;
      return `<a href="${url}" target="_blank" rel="noopener" class="gcal-btn" data-ga="click_google_calendar" data-ga-text="${ipo.name}" data-ga-loc="ipo_list_card">&#128197; 구글 캘린더에 청약일정 추가</a>`;
    }

    function getDDay(ipo) {
      if (!isValidDate(ipo.subscribe[0])) {
        if (ipo.status === 'completed') return { text: '상장완료', cls: 'done' };
        return { text: '-', cls: '' };
      }
      const subStart = parseDate(ipo.subscribe[0]);
      const diff = daysBetween(TODAY, subStart);
      if (ipo.status === 'completed') return { text: '상장완료', cls: 'done' };
      if (ipo.status === 'active') return { text: '청약중', cls: 'imminent' };
      if (diff === 0) return { text: 'D-Day', cls: 'imminent' };
      if (diff > 0) return { text: `D-${diff}`, cls: diff <= 3 ? 'imminent' : '' };
      return { text: '완료', cls: 'done' };
    }

    function getStatusLabel(s) {
      return { upcoming: '청약예정', active: '청약중', completed: '상장완료' }[s] || s;
    }

    // ── Calendar Events for a given day ──
    function getEventsForDay(year, month, day) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const events = [];
      const filtered = getFilteredIPOs();
      filtered.forEach(ipo => {
        if (isDateInRange(dateStr, ipo.subscribe[0], ipo.subscribe[1])) {
          events.push({ type: 'subscribe', label: '청약', name: ipo.name });
        }
        if (ipo.refund === dateStr) {
          events.push({ type: 'refund', label: '환불', name: ipo.name });
        }
        if (ipo.listing === dateStr) {
          events.push({ type: 'listing', label: '상장', name: ipo.name });
        }
      });
      return events;
    }

    // ── Filtering ──
    function getFilteredIPOs() {
      return IPO_DATA.filter(ipo => {
        if (activeStatus !== 'all' && ipo.status !== activeStatus) return false;
        if (activeMarket !== 'all' && ipo.market !== activeMarket) return false;
        return true;
      });
    }

    function getVisibleIPOs() {
      let list = getFilteredIPOs();
      if (selectedDate) {
        const dateStr = `${selectedDate.getFullYear()}-${String(selectedDate.getMonth() + 1).padStart(2, '0')}-${String(selectedDate.getDate()).padStart(2, '0')}`;
        list = list.filter(ipo =>
          isDateInRange(dateStr, ipo.subscribe[0], ipo.subscribe[1]) ||
          ipo.refund === dateStr ||
          ipo.listing === dateStr
        );
      } else {
        // 선택 날짜 없을 때: 현재 보고 있는 월에 이벤트가 있는 IPO만 표시
        const monthStart = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-01`;
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const monthEnd = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(daysInMonth).padStart(2, '0')}`;
        list = list.filter(ipo => {
          // 청약일이 해당 월과 겹치는지
          if (isValidDate(ipo.subscribe[0]) && isValidDate(ipo.subscribe[1])) {
            if (ipo.subscribe[1] >= monthStart && ipo.subscribe[0] <= monthEnd) return true;
          }
          // 환불일이 해당 월인지
          if (isValidDate(ipo.refund) && ipo.refund >= monthStart && ipo.refund <= monthEnd) return true;
          // 상장일이 해당 월인지
          if (isValidDate(ipo.listing) && ipo.listing >= monthStart && ipo.listing <= monthEnd) return true;
          return false;
        });
      }
      return list;
    }

    // ── Render Calendar ──
    function renderCalendar() {
      const monthEl = document.getElementById('calMonth');
      monthEl.textContent = `${currentYear}년 ${currentMonth + 1}월`;

      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';

      const dows = ['일', '월', '화', '수', '목', '금', '토'];
      dows.forEach(d => {
        const el = document.createElement('div');
        el.className = 'cal-dow';
        el.textContent = d;
        grid.appendChild(el);
      });

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const prevDays = new Date(currentYear, currentMonth, 0).getDate();

      // Previous month padding
      for (let i = firstDay - 1; i >= 0; i--) {
        const el = document.createElement('div');
        el.className = 'cal-day other-month';
        el.innerHTML = `<span class="day-num">${prevDays - i}</span><div class="day-events"></div><div class="day-dots-mobile"></div>`;
        grid.appendChild(el);
      }

      // Current month
      const MAX_BARS = 2;
      for (let d = 1; d <= daysInMonth; d++) {
        const el = document.createElement('div');
        el.className = 'cal-day';
        const thisDate = new Date(currentYear, currentMonth, d);
        if (isSameDay(thisDate, TODAY)) el.classList.add('today');
        if (selectedDate && isSameDay(thisDate, selectedDate)) el.classList.add('selected');

        const events = getEventsForDay(currentYear, currentMonth, d);

        // Desktop: event bars
        let barsHtml = '';
        const visible = events.slice(0, MAX_BARS);
        const overflow = events.length - MAX_BARS;
        visible.forEach(evt => {
          barsHtml += `<div class="evt-bar ${evt.type}">${evt.name}</div>`;
        });
        if (overflow > 0) {
          barsHtml += `<span class="evt-more">+${overflow}건</span>`;
        }

        // Mobile: dots
        const dotTypes = new Set(events.map(e => e.type));
        let dotsHtml = '';
        ['subscribe', 'refund', 'listing'].forEach(t => {
          if (dotTypes.has(t)) dotsHtml += `<span class="day-dot-m ${t}"></span>`;
        });

        // Tooltip
        let tooltipHtml = '';
        if (events.length > 0) {
          const dateLabel = `${currentMonth + 1}월 ${d}일`;
          let items = events.map(evt =>
            `<div class="tt-item"><span class="tt-dot ${evt.type}"></span><span class="tt-type">${evt.label}</span><span class="tt-name">${evt.name}</span></div>`
          ).join('');
          tooltipHtml = `<div class="cal-tooltip"><div class="tt-date">${dateLabel}</div>${items}</div>`;
        }

        el.innerHTML = `
          <span class="day-num">${d}</span>
          <div class="day-events">${barsHtml}</div>
          <div class="day-dots-mobile">${dotsHtml}</div>
          ${tooltipHtml}`;

        el.addEventListener('click', () => {
          const clicked = new Date(currentYear, currentMonth, d);
          if (selectedDate && isSameDay(selectedDate, clicked)) {
            selectedDate = null;
          } else {
            selectedDate = clicked;
          }
          renderAll();
        });
        grid.appendChild(el);
      }

      // Next month padding
      const totalCells = firstDay + daysInMonth;
      const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let i = 1; i <= remaining; i++) {
        const el = document.createElement('div');
        el.className = 'cal-day other-month';
        el.innerHTML = `<span class="day-num">${i}</span><div class="day-events"></div><div class="day-dots-mobile"></div>`;
        grid.appendChild(el);
      }
    }

    // ── Render IPO Cards ──
    function renderIPOList() {
      const list = document.getElementById('ipoList');
      const countEl = document.getElementById('listCount');
      const ipos = getVisibleIPOs();
      countEl.textContent = `(${ipos.length})`;

      if (ipos.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">&#9749;</div>
            <p class="empty-text">${selectedDate ? '선택한 날짜에 해당하는 공모주가 없습니다' : '조건에 맞는 공모주가 없습니다'}</p>
          </div>`;
        return;
      }

      list.innerHTML = ipos.map(ipo => {
        const dday = getDDay(ipo);
        const subDone = isValidDate(ipo.subscribe[1]) && parseDate(ipo.subscribe[1]) < TODAY;
        const refundDone = isValidDate(ipo.refund) && parseDate(ipo.refund) < TODAY;
        const listDone = isValidDate(ipo.listing) && parseDate(ipo.listing) <= TODAY;

        return `
        <div class="ipo-card">
          <div class="ipo-top">
            <div class="ipo-name-group">
              <div class="ipo-name">${ipo.name} ${getGradeBadge(ipo.grade, ipo._dataCount || 0)}</div>
              <div class="ipo-badges">
                <span class="ipo-badge ${ipo.market}">${ipo.market === 'kospi' ? '코스피' : '코스닥'}</span>
                <span class="ipo-badge ${ipo.status}">${getStatusLabel(ipo.status)}</span>
              </div>
            </div>
            <span class="dday ${dday.cls}">${dday.text}</span>
          </div>
          <div class="ipo-timeline">
            <div class="tl-step ${subDone || ipo.status === 'active' ? (ipo.status === 'active' ? 'current' : 'done') : ''}">
              <div class="tl-label">청약</div>
              <div class="tl-date">${fmtDate(ipo.subscribe[0])}~${fmtDate(ipo.subscribe[1])}</div>
            </div>
            <div class="tl-step ${refundDone ? 'done' : ''}">
              <div class="tl-label">환불</div>
              <div class="tl-date">${fmtDate(ipo.refund)}</div>
            </div>
            <div class="tl-step ${listDone ? 'done' : ''}">
              <div class="tl-label">상장</div>
              <div class="tl-date">${fmtDate(ipo.listing)}</div>
            </div>
          </div>
          <div class="ipo-info">
            <div class="info-item">
              <span class="info-label">공모가</span>
              <span class="info-value">${ipo.price !== '-' ? ipo.price : ipo.priceRange}</span>
            </div>
            <div class="info-item">
              <span class="info-label">주관사</span>
              <span class="info-value">${ipo.lead}</span>
            </div>
            <div class="info-item">
              <span class="info-label">경쟁률</span>
              <span class="info-value">${ipo.competition}</span>
            </div>
            <div class="info-item">
              <span class="info-label">확약비율</span>
              <span class="info-value">${ipo.lockup}</span>
            </div>
          </div>
          ${ipo.status === 'upcoming' ? getCalendarBtn(ipo) : ''}
          <a href="/ipo-analysis.html?name=${encodeURIComponent(ipo.name)}" class="detail-btn" data-ga="click_detail_analysis" data-ga-text="${ipo.name}" data-ga-loc="ipo_list_card">&#128270; 세부 분석 보러가기</a>
        </div>`;
      }).join('');
    }

    // ── Render All ──
    function renderAll() {
      renderCalendar();
      renderIPOList();
    }

    // ── Month Navigation ──
    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      selectedDate = null;
      renderAll();
    }

    // ── Filter Handlers ──
    document.getElementById('statusFilters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('#statusFilters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeStatus = btn.dataset.status;
      selectedDate = null;
      renderAll();
    });

    document.getElementById('marketFilters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('#marketFilters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeMarket = btn.dataset.market;
      selectedDate = null;
      renderAll();
    });

    // ── Init ──
    loadFromSheets();
  </script>
<script>
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-ga]');
  if (!el) return;
  gtag('event', el.dataset.ga, {
    click_text: el.dataset.gaText || el.textContent.trim().substring(0, 50),
    click_location: el.dataset.gaLoc || 'unknown'
  });
});
</script>
</body>
</html>
